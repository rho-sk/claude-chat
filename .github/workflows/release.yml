name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install plugin dependencies
        run: npm ci

      - name: Install bridge dependencies
        run: npm ci --prefix bridge

      - name: Build plugin
        run: node build/esbuild.mjs

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Update versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=${{ steps.version.outputs.version }}
          MIN_APP=$(node -e "process.stdout.write(require('./src/manifest.json').minAppVersion)")
          for i in 1 2 3; do
            git fetch origin main
            git checkout origin/main -- versions.json
            node -e "
              const fs = require('fs');
              const v = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
              v['${VERSION}'] = '${MIN_APP}';
              fs.writeFileSync('versions.json', JSON.stringify(v, null, 2) + '\n');
            "
            git add versions.json
            if git diff --staged --quiet; then
              echo "versions.json already up to date"
              break
            fi
            git commit -m "chore: update versions.json for ${{ steps.version.outputs.version }}"
            git push origin HEAD:main && break || git reset --soft HEAD~1
            echo "Push failed (attempt $i), retrying..."
            sleep 3
          done

      - name: Create release ZIP
        run: |
          VERSION=${{ steps.version.outputs.version }}
          PLUGIN_DIR=/tmp/claude-chat

          mkdir -p "$PLUGIN_DIR/bridge"

          # Plugin files
          cp build/dist/main.js   "$PLUGIN_DIR/main.js"
          cp src/styles.css       "$PLUGIN_DIR/styles.css"
          cp src/manifest.json    "$PLUGIN_DIR/manifest.json"

          # Bridge daemon + SDK (exclude .bin symlinks)
          rsync -a --exclude='node_modules/.bin' bridge/ "$PLUGIN_DIR/bridge/"

          cd /tmp && zip -r claude-chat-v${VERSION}.zip claude-chat/
          mv /tmp/claude-chat-v${VERSION}.zip $GITHUB_WORKSPACE/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            build/dist/main.js
            src/manifest.json
            src/styles.css
            claude-chat-v${{ steps.version.outputs.version }}.zip
